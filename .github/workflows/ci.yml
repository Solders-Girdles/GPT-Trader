name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  merge_group:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: CI Change Classifier
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      tui_css: ${{ steps.classify.outputs.tui_css }}
      tui_snapshots: ${{ steps.classify.outputs.tui_snapshots }}
      agent_artifacts: ${{ steps.classify.outputs.agent_artifacts }}
      dependencies: ${{ steps.classify.outputs.dependencies }}
    steps:
      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Classify changed paths
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          emit_outputs() {
            {
              echo "tui_css=$1"
              echo "tui_snapshots=$2"
              echo "agent_artifacts=$3"
              echo "dependencies=$4"
            } >> "$GITHUB_OUTPUT"
          }

          emit_all_true() {
            emit_outputs true true true true
          }

          EVENT_NAME="${{ github.event_name }}"
          BASE_SHA=""
          HEAD_SHA="$GITHUB_SHA"

          case "$EVENT_NAME" in
            pull_request)
              BASE_SHA="${{ github.event.pull_request.base.sha }}"
              HEAD_SHA="${{ github.event.pull_request.head.sha }}"
              ;;
            merge_group)
              echo "Merge-group event; running all conditional checks."
              emit_all_true
              exit 0
              ;;
            push)
              BASE_SHA="${{ github.event.before }}"
              HEAD_SHA="${{ github.event.after }}"
              ;;
            *)
              echo "Workflow dispatch or unknown event; running all conditional checks."
              emit_all_true
              exit 0
              ;;
          esac

          if [ -z "$BASE_SHA" ] || [ -z "$HEAD_SHA" ] || [[ "$BASE_SHA" =~ ^0+$ ]]; then
            echo "Could not determine a stable diff range; running all conditional checks."
            emit_all_true
            exit 0
          fi

          DIFF_BASE_SHA="$BASE_SHA"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            if ! DIFF_BASE_SHA=$(git merge-base "$BASE_SHA" "$HEAD_SHA"); then
              echo "::warning::Could not compute merge-base for $BASE_SHA and $HEAD_SHA; running all conditional checks."
              emit_all_true
              exit 0
            fi
            if [ -z "$DIFF_BASE_SHA" ]; then
              echo "::warning::Merge-base for $BASE_SHA and $HEAD_SHA was empty; running all conditional checks."
              emit_all_true
              exit 0
            fi
          fi

          # Disable rename detection so moved guarded inputs classify by source path too.
          if ! changed_files=$(git diff --name-only --no-renames "$DIFF_BASE_SHA" "$HEAD_SHA"); then
            echo "::warning::Could not diff $DIFF_BASE_SHA..$HEAD_SHA; running all conditional checks."
            emit_all_true
            exit 0
          fi

          tui_css=false
          tui_snapshots=false
          agent_artifacts=false
          dependencies=false

          while IFS= read -r path; do
            [ -n "$path" ] || continue
            case "$path" in
              .github/workflows/ci.yml)
                tui_css=true
                tui_snapshots=true
                agent_artifacts=true
                dependencies=true
                ;;
              .github/workflows/agent-artifacts-refresh.yml)
                agent_artifacts=true
                ;;
              .github/workflows/uv_lock_upgrade.yml|.github/dependabot.yml|pyproject.toml|uv.lock|requirements*.txt|*/requirements*.txt|requirements*.in|*/requirements*.in|constraints*.txt|*/constraints*.txt|constraints*.in|*/constraints*.in|Dockerfile|*/Dockerfile)
                dependencies=true
                ;;
            esac

            case "$path" in
              pyproject.toml|uv.lock)
                tui_snapshots=true
                agent_artifacts=true
                ;;
              conftest.py|pytest.ini|tests/conftest.py|tests/unit/conftest.py|tests/unit/gpt_trader/conftest.py)
                tui_snapshots=true
                ;;
              src/gpt_trader/tui/*.tcss|src/gpt_trader/tui/styles/*|scripts/build_tui_css.py|scripts/ci/check_tui_css_up_to_date.py)
                tui_css=true
                tui_snapshots=true
                ;;
              src/gpt_trader/tui/*|tests/unit/gpt_trader/tui/*)
                tui_snapshots=true
                ;;
              src/gpt_trader/features/trade_ideas/*|tests/unit/gpt_trader/features/trade_ideas/conftest.py|src/gpt_trader/features/live_trade/telemetry/*|src/gpt_trader/monitoring/status_reporter.py)
                tui_snapshots=true
                ;;
            esac

            case "$path" in
              src/*|tests/*|scripts/*.py|scripts/**/*.py|scripts/agents/*|src/gpt_trader/agents/*|config/agents/*|config/environments/.env.template|pytest.ini|var/agents/*)
                agent_artifacts=true
                ;;
            esac
          done <<< "$changed_files"

          emit_outputs "$tui_css" "$tui_snapshots" "$agent_artifacts" "$dependencies"

          {
            echo "## CI Change Classifier"
            echo ""
            echo "- TUI CSS: $tui_css"
            echo "- TUI snapshots: $tui_snapshots"
            echo "- Agent artifacts freshness: $agent_artifacts"
            echo "- Dependency review: $dependencies"
            echo ""
            echo "Changed files:"
            echo '```'
            printf '%s\n' "$changed_files" | sed -n '1,120p'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install uv
        # astral-sh/setup-uv@v7
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true

      - name: Set up Python
        # actions/setup-python@v5
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint (Ruff)
        run: uv run ruff check .

      - name: Lint (Ruff - critical scripts)
        run: uv run ruff check scripts/ops scripts/ci scripts/analysis/backtest_runner.py scripts/monitoring scripts/production_preflight.py

      - name: Format (Black)
        run: uv run black --check .

      - name: Guard against orchestration imports (removed in v3.0)
        run: python scripts/ci/check_orchestration_imports.py

      - name: Guard deprecation registry
        run: python scripts/ci/check_deprecation_registry.py

  docs-audit:
    name: Docs Link Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install uv
        # astral-sh/setup-uv@v7
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true

      - name: Set up Python
        # actions/setup-python@v5
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run markdown link audit
        run: |
          set -o pipefail
          mkdir -p var/ci/docs_audit
          python scripts/maintenance/docs_link_audit.py 2>&1 | tee var/ci/docs_audit/docs_link_audit.log

      - name: Check docs reachability
        run: |
          set -o pipefail
          mkdir -p var/ci/docs_audit
          python scripts/maintenance/docs_reachability_check.py 2>&1 | tee var/ci/docs_audit/docs_reachability.log

      - name: Docs audit summary
        if: always()
        run: |
          {
            if [ "${{ job.status }}" = "success" ]; then
              echo "Docs audit OK"
            else
              echo "Docs audit failed."
              for file in var/ci/docs_audit/docs_link_audit.log var/ci/docs_audit/docs_reachability.log; do
                if [ -f "$file" ]; then
                  echo ""
                  echo "### $(basename "$file") (first 40 lines)"
                  echo '```'
                  sed -n '1,40p' "$file"
                  echo '```'
                else
                  echo ""
                  echo "Log not found: $file"
                fi
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install uv
        # astral-sh/setup-uv@v7
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true

      - name: Set up Python
        # actions/setup-python@v5
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Type Check (MyPy)
        run: uv run mypy src

  agent-health:
    name: Agent Health
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install uv
        # astral-sh/setup-uv@v7
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true

      - name: Set up Python
        # actions/setup-python@v5
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run agent-health (fast, dev profile)
        run: |
          set -u
          set -o pipefail
          mkdir -p var/agents/health
          set +e
          make agent-health-fast AGENT_HEALTH_FAST_QUALITY_CHECKS=none
          status=$?
          set -e
          if [ -f var/agents/health/health_report.json ]; then
            uv run python - <<'PY' | tee var/agents/health/health_report.txt
          from scripts.agents.health_report import format_text_report
          import json
          with open("var/agents/health/health_report.json") as handle:
              report = json.load(handle)
          print(format_text_report(report))
          PY
          fi
          exit $status

      - name: Upload agent-health artifact
        if: always()
        # actions/upload-artifact@v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: agent-health-report
          path: var/agents/health/health_report.json
          retention-days: 14

      - name: Add agent-health summary
        if: always()
        run: |
          if [ -f var/agents/health/health_report.txt ]; then
            echo "## Agent Health" >> $GITHUB_STEP_SUMMARY
            cat var/agents/health/health_report.txt >> $GITHUB_STEP_SUMMARY
          fi

  agent-freshness:
    name: Agent Artifacts Freshness
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: always()
    steps:
      - name: Fail when change classifier did not succeed
        if: needs.changes.result != 'success'
        run: |
          echo "::error::CI Change Classifier ended with result '${{ needs.changes.result }}'; failing closed."
          exit 1

      - name: Skip freshness check
        if: needs.changes.result == 'success' && needs.changes.outputs.agent_artifacts != 'true'
        run: |
          echo "Agent artifact inputs did not change; skipping advisory freshness verification."
          {
            echo "## Agent Artifacts Freshness"
            echo "Status: SKIPPED (no agent artifact inputs changed)"
          } >> "$GITHUB_STEP_SUMMARY"

      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        if: needs.changes.result == 'success' && needs.changes.outputs.agent_artifacts == 'true'
        with:
          persist-credentials: false

      - name: Install uv
        if: needs.changes.result == 'success' && needs.changes.outputs.agent_artifacts == 'true'
        # astral-sh/setup-uv@v7
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true

      - name: Set up Python
        if: needs.changes.result == 'success' && needs.changes.outputs.agent_artifacts == 'true'
        # actions/setup-python@v5
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        if: needs.changes.result == 'success' && needs.changes.outputs.agent_artifacts == 'true'
        run: uv sync --all-extras --dev

      - name: Verify agent artifacts freshness
        if: needs.changes.result == 'success' && needs.changes.outputs.agent_artifacts == 'true'
        id: verify
        run: |
          set +e
          set -o pipefail
          mkdir -p var/agents/health
          uv run agent-regenerate --verify | tee var/agents/health/agent_regenerate_verify.txt
          status=$?
          set +o pipefail
          set -e

          EVENT_NAME="${{ github.event_name }}"
          echo "exit_code=$status" >> $GITHUB_OUTPUT

          if [ $status -ne 0 ]; then
            echo "::error::Agent artifacts are stale; run uv run agent-regenerate and commit the changes"
            echo "Fix command: uv run agent-regenerate"
            echo "Verify log: var/agents/health/agent_regenerate_verify.txt"
            changed_files=$(git status --porcelain)
            if [ -n "$changed_files" ]; then
              echo "Changed files (git status --porcelain):"
              echo "$changed_files"
            else
              echo "No working tree changes detected; diffstat:"
              git diff --stat
            fi

            # Non-blocking on PRs: signal in summary, but don't stall merges.
            if [ "$EVENT_NAME" = "pull_request" ]; then
              echo "::warning::Agent artifacts are stale (non-blocking on pull_request); a scheduled refresh workflow will update these on main."
              exit 0
            fi
          fi

          exit $status

      - name: Add freshness summary
        if: always() && needs.changes.result == 'success' && needs.changes.outputs.agent_artifacts == 'true'
        run: |
          EVENT_NAME="${{ github.event_name }}"
          echo "## Agent Artifacts Freshness" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.verify.outputs.exit_code }}" != "0" ]; then
            if [ "$EVENT_NAME" = "pull_request" ]; then
              echo "Status: STALE (non-blocking on PR; scheduled refresh will update on main)" >> $GITHUB_STEP_SUMMARY
            else
              echo "Status: STALE (run \`uv run agent-regenerate\`)" >> $GITHUB_STEP_SUMMARY
              echo "Fix: \`uv run agent-regenerate\`" >> $GITHUB_STEP_SUMMARY
            fi
            echo "Verify log: \`var/agents/health/agent_regenerate_verify.txt\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "Status: OK" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f var/agents/health/agent_regenerate_verify.txt ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            sed -n '1,40p' var/agents/health/agent_regenerate_verify.txt >> $GITHUB_STEP_SUMMARY
          fi

  tui-css:
    name: TUI CSS Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: always()
    steps:
      - name: Fail when change classifier did not succeed
        if: needs.changes.result != 'success'
        run: |
          echo "::error::CI Change Classifier ended with result '${{ needs.changes.result }}'; failing closed."
          exit 1

      - name: Skip TUI CSS check
        if: needs.changes.result == 'success' && needs.changes.outputs.tui_css != 'true'
        run: |
          echo "TUI CSS inputs did not change; skipping CSS freshness verification."
          {
            echo "## TUI CSS Check"
            echo "Status: SKIPPED (no TUI CSS inputs changed)"
          } >> "$GITHUB_STEP_SUMMARY"

      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        if: needs.changes.result == 'success' && needs.changes.outputs.tui_css == 'true'
        with:
          persist-credentials: false

      - name: Install uv
        if: needs.changes.result == 'success' && needs.changes.outputs.tui_css == 'true'
        # astral-sh/setup-uv@v7
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true

      - name: Set up Python
        if: needs.changes.result == 'success' && needs.changes.outputs.tui_css == 'true'
        # actions/setup-python@v5
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        if: needs.changes.result == 'success' && needs.changes.outputs.tui_css == 'true'
        run: uv sync --all-extras --dev

      - name: Check TUI CSS is up to date
        if: needs.changes.result == 'success' && needs.changes.outputs.tui_css == 'true'
        run: python scripts/ci/check_tui_css_up_to_date.py

  test-guardrails:
    name: Test Guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install uv
        # astral-sh/setup-uv@v7
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true

      - name: Set up Python
        # actions/setup-python@v5
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Check test hygiene
        run: uv run python scripts/ci/check_test_hygiene.py

      - name: Check legacy patterns
        run: uv run python scripts/ci/check_legacy_patterns.py

      - name: Check import boundaries
        run: uv run python scripts/ci/check_import_boundaries.py

      - name: Check legacy triage alignment
        run: uv run python scripts/ci/check_legacy_test_triage.py

      - name: Check dedupe manifest
        run: uv run python scripts/ci/check_dedupe_manifest.py --strict

      - name: Check triage backlog
        run: make test-triage-check

  unit-tests:
    name: Unit Tests (Core)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GPT_TRADER_STRICT_CONTAINER: "1"
      PYTHONWARNINGS: default
    steps:
      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install uv
        # astral-sh/setup-uv@v7
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true

      - name: Set up Python
        # actions/setup-python@v5
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run unit tests (excluding TUI snapshots)
        run: uv run pytest tests/unit -n auto -q --ignore-glob=tests/unit/gpt_trader/tui/test_snapshots_*.py

  windows-unit-tests:
    name: Windows Unit Tests (Portability)
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      GPT_TRADER_STRICT_CONTAINER: "1"
      PYTHONWARNINGS: default
    steps:
      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install uv
        # astral-sh/setup-uv@v7
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true

      - name: Set up Python
        # actions/setup-python@v5
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Windows-sensitive unit tests
        run: uv run pytest tests/unit/gpt_trader/persistence tests/unit/gpt_trader/monitoring tests/unit/scripts -q

  tui-snapshots:
    name: TUI Snapshot Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: always()
    env:
      GPT_TRADER_STRICT_CONTAINER: "1"
      PYTHONWARNINGS: default
    steps:
      - name: Fail when change classifier did not succeed
        if: needs.changes.result != 'success'
        run: |
          echo "::error::CI Change Classifier ended with result '${{ needs.changes.result }}'; failing closed."
          exit 1

      - name: Skip TUI snapshot tests
        if: needs.changes.result == 'success' && needs.changes.outputs.tui_snapshots != 'true'
        run: |
          echo "TUI snapshot inputs did not change; skipping snapshot tests."
          {
            echo "## TUI Snapshot Tests"
            echo "Status: SKIPPED (no TUI snapshot inputs changed)"
          } >> "$GITHUB_STEP_SUMMARY"

      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        if: needs.changes.result == 'success' && needs.changes.outputs.tui_snapshots == 'true'
        with:
          persist-credentials: false

      - name: Install uv
        if: needs.changes.result == 'success' && needs.changes.outputs.tui_snapshots == 'true'
        # astral-sh/setup-uv@v7
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true

      - name: Set up Python
        if: needs.changes.result == 'success' && needs.changes.outputs.tui_snapshots == 'true'
        # actions/setup-python@v5
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        if: needs.changes.result == 'success' && needs.changes.outputs.tui_snapshots == 'true'
        run: uv sync --all-extras --dev

      - name: Run TUI snapshot tests
        if: needs.changes.result == 'success' && needs.changes.outputs.tui_snapshots == 'true'
        run: uv run pytest tests/unit/gpt_trader/tui/test_snapshots_*.py -v

  property-tests:
    name: Property Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GPT_TRADER_STRICT_CONTAINER: "1"
      PYTHONWARNINGS: default
    steps:
      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install uv
        # astral-sh/setup-uv@v7
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true

      - name: Set up Python
        # actions/setup-python@v5
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run property tests
        run: uv run pytest tests/property -v

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GPT_TRADER_STRICT_CONTAINER: "1"
      PYTHONWARNINGS: default
    steps:
      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install uv
        # astral-sh/setup-uv@v7
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true

      - name: Set up Python
        # actions/setup-python@v5
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run contract tests
        run: uv run pytest tests/contract -v

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    needs: changes
    steps:
      - name: Fail when change classifier did not succeed
        if: needs.changes.result != 'success'
        run: |
          echo "::error::CI Change Classifier ended with result '${{ needs.changes.result }}'; failing closed."
          exit 1

      - name: Skip dependency review
        if: needs.changes.result == 'success' && needs.changes.outputs.dependencies != 'true'
        run: |
          echo "Dependency manifests did not change; skipping dependency review."
          {
            echo "## Dependency Review"
            echo "Status: SKIPPED (no dependency manifest inputs changed)"
          } >> "$GITHUB_STEP_SUMMARY"

      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        if: needs.changes.result == 'success' && needs.changes.outputs.dependencies == 'true'
        with:
          persist-credentials: false

      - name: Review dependencies
        if: needs.changes.result == 'success' && needs.changes.outputs.dependencies == 'true'
        # actions/dependency-review-action@v5.0.0
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: high
