name: UV Lock Upgrade

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  upgrade-lock:
    name: Upgrade uv.lock
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install uv
        # astral-sh/setup-uv@v7
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true

      - name: Set up Python
        # actions/setup-python@v5
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version-file: ".python-version"

      - name: Upgrade lockfile
        run: |
          uv lock --upgrade
          uv sync --all-extras --dev --frozen

      - name: Create Pull Request
        # peter-evans/create-pull-request@v8
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          commit-message: "chore(deps): upgrade uv.lock"
          title: "chore(deps): upgrade uv.lock"
          body: |
            Automated weekly dependency upgrade via `uv lock --upgrade`.
          labels: dependencies
          branch: chore/uv-lock-upgrade
          delete-branch: true
