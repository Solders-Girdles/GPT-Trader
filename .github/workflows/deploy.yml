name: Release Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_note:
        description: 'Decision packet, runbook, or release note reference for this image publication'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/gpt-trader

concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  build-image:
    name: Build, Publish, and Scan Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      packages: write
      security-events: write
    outputs:
      image-tag: ${{ steps.scan-target.outputs.image }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Confirm release boundary
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_NOTE: ${{ github.event.inputs.release_note }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            reference="${RELEASE_NOTE:-}"
            [ -n "${reference//[[:space:]]/}" ] || {
              echo "release_note is required for manual release-image runs" >&2
              exit 1
            }
          else
            reference="${GITHUB_REF_NAME:-unknown}"
          fi
          echo "Publishing and scanning a release image only."
          echo "Reference: ${reference}"
          echo "This workflow does not deploy staging or production."
          echo "It does not run canary/prod preflight, broker/API commands, money movement, or order submission."

      - name: Checkout code
        # actions/checkout@v7
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        # docker/setup-buildx-action@v4
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Log in to GitHub Container Registry
        # docker/login-action@v4
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        # docker/metadata-action@v6
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        # docker/build-push-action@v7
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: deploy/gpt_trader/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          target: production

      - name: Determine scan target
        id: scan-target
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          first_tag=$(printf '%s\n' "$TAGS" | head -n 1)
          echo "image=$first_tag" >> "$GITHUB_OUTPUT"

      - name: Run Trivy vulnerability scanner
        # aquasecurity/trivy-action pinned to audited commit
        uses: aquasecurity/trivy-action@cf5c088a69634cd13ccddc735d7926162c31f9a6
        with:
          image-ref: ${{ steps.scan-target.outputs.image }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        if: always()
        # github/codeql-action/upload-sarif@v4
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          sarif_file: 'trivy-results.sarif'
