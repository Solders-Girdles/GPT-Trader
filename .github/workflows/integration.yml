name: Integration Tests (Manual)

on:
  workflow_dispatch:

jobs:
  integration:
    name: Integration Suite (Mock Broker)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GPT_TRADER_STRICT_CONTAINER: "1"
      PYTHONWARNINGS: default

    steps:
      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install uv
        # astral-sh/setup-uv@v7
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true

      - name: Set up Python
        # actions/setup-python@v5
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      # Full integration suite including slow tests. The suite runs against
      # DeterministicBroker (tests/integration/conftest.py forces MOCK_BROKER=1),
      # so no Coinbase secrets or deployment environment are needed. The fast
      # subset (not slow) also runs on every PR via ci.yml.
      - name: Run integration tests
        run: uv run pytest -o addopts= -m "integration and not real_api" tests/integration -v
