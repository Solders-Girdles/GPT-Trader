name: Agent Artifacts Refresh

on:
  schedule:
    # Every 6 hours, offset to avoid common top-of-hour spikes.
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      source-ref:
        description: "Git ref to regenerate from"
        required: false
        default: "main"
      publish-branch:
        description: "Branch that receives refreshed var/agents files"
        required: false
        default: "automation/agent-artifacts-refresh"

permissions:
  actions: read
  contents: write
  pull-requests: read

concurrency:
  group: agent-artifacts-refresh
  cancel-in-progress: false

env:
  AGENT_ARTIFACTS_DIR: var/agents
  AGENT_ARTIFACTS_OUTPUT_DIR: dist/agent-artifacts
  AGENT_ARTIFACTS_BRANCH: ${{ github.event.inputs['publish-branch'] || 'automation/agent-artifacts-refresh' }}
  DEFAULT_BRANCH: main
  SOURCE_REF: ${{ github.event.inputs['source-ref'] || 'main' }}

jobs:
  refresh:
    name: Refresh, validate, and publish package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      package_name: ${{ steps.package.outputs.package_name }}
      changed: ${{ steps.diff.outputs.changed }}
      publication_branch: ${{ env.AGENT_ARTIFACTS_BRANCH }}
    steps:
      - name: Checkout source ref
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_REF }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Log refresh context
        id: context
        run: |
          set -euo pipefail
          source_sha="$(git rev-parse HEAD)"
          echo "source_sha=${source_sha}" >> "${GITHUB_OUTPUT}"
          echo "Repository: ${GITHUB_REPOSITORY}"
          echo "Default branch: ${DEFAULT_BRANCH}"
          echo "Source ref: ${SOURCE_REF}"
          echo "Source SHA: ${source_sha}"
          echo "Artifact directory: ${AGENT_ARTIFACTS_DIR}"
          echo "Publication branch: ${AGENT_ARTIFACTS_BRANCH}"

      - name: Regenerate agent artifacts
        run: |
          set -euo pipefail
          uv run agent-regenerate

      - name: Validate generated agent artifacts
        run: |
          set -euo pipefail
          uv run agent-artifacts validate \
            --source "${AGENT_ARTIFACTS_DIR}" \
            --github-annotations

      - name: Package generated agent artifacts
        id: package
        run: |
          set -euo pipefail
          package_name="agent-artifacts-${GITHUB_RUN_ID}"
          echo "package_name=${package_name}" >> "${GITHUB_OUTPUT}"
          rm -rf "${AGENT_ARTIFACTS_OUTPUT_DIR}"
          uv run agent-artifacts package \
            --source "${AGENT_ARTIFACTS_DIR}" \
            --output-dir "${AGENT_ARTIFACTS_OUTPUT_DIR}" \
            --git-sha "${{ steps.context.outputs.source_sha }}" \
            --github-annotations
          uv run agent-artifacts verify-package \
            --package "${AGENT_ARTIFACTS_OUTPUT_DIR}/agent-artifacts.tar.gz" \
            --manifest "${AGENT_ARTIFACTS_OUTPUT_DIR}/agent-artifacts-manifest.json" \
            --github-annotations
          ls -lh "${AGENT_ARTIFACTS_OUTPUT_DIR}"

      - name: Detect artifact changes
        id: diff
        run: |
          set -euo pipefail
          if git diff --quiet -- "${AGENT_ARTIFACTS_DIR}"; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            echo "Agent artifacts are already current on ${DEFAULT_BRANCH}."
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            echo "Changed agent artifacts:"
            git diff --stat -- "${AGENT_ARTIFACTS_DIR}"
          fi

      - name: Upload packaged agent artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.package_name }}
          path: |
            ${{ env.AGENT_ARTIFACTS_OUTPUT_DIR }}/agent-artifacts.tar.gz
            ${{ env.AGENT_ARTIFACTS_OUTPUT_DIR }}/agent-artifacts-manifest.json
          if-no-files-found: error
          retention-days: 14

      - name: Publish refreshed artifacts to automation branch
        if: steps.diff.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin "${AGENT_ARTIFACTS_BRANCH}" || true
          if git show-ref --verify --quiet "refs/remotes/origin/${AGENT_ARTIFACTS_BRANCH}"; then
            lease="--force-with-lease=${AGENT_ARTIFACTS_BRANCH}:$(git rev-parse "refs/remotes/origin/${AGENT_ARTIFACTS_BRANCH}")"
          else
            lease="--force-with-lease"
          fi

          git switch -c "${AGENT_ARTIFACTS_BRANCH}"
          git add "${AGENT_ARTIFACTS_DIR}"
          git commit -m "chore: refresh agent artifacts"
          git push "${lease}" origin "HEAD:${AGENT_ARTIFACTS_BRANCH}"
          echo "Published refreshed artifacts to ${AGENT_ARTIFACTS_BRANCH}."

      - name: Report publication state
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          {
            echo "## Agent Artifacts Refresh"
            echo ""
            echo "- Source ref: \`${SOURCE_REF}\`"
            echo "- Source SHA: \`${{ steps.context.outputs.source_sha }}\`"
            echo "- Package artifact: \`${{ steps.package.outputs.package_name }}\`"
            echo "- Generated changes: \`${{ steps.diff.outputs.changed || 'unknown' }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            compare_url="https://github.com/${GITHUB_REPOSITORY}/compare/${SOURCE_REF}...${AGENT_ARTIFACTS_BRANCH}"
            pr_url="$(gh pr list \
              --head "${AGENT_ARTIFACTS_BRANCH}" \
              --base "${DEFAULT_BRANCH}" \
              --state open \
              --json url \
              --jq '.[0].url // ""' || true)"
            {
              echo "- Publication branch: \`${AGENT_ARTIFACTS_BRANCH}\`"
              echo "- Compare: ${compare_url}"
            } >> "${GITHUB_STEP_SUMMARY}"
            if [ -n "${pr_url}" ]; then
              echo "- Open PR: ${pr_url}" >> "${GITHUB_STEP_SUMMARY}"
            else
              echo "- Open PR: none; create one from \`${AGENT_ARTIFACTS_BRANCH}\` when the package is ready to commit." >> "${GITHUB_STEP_SUMMARY}"
              echo "::notice::Refreshed artifacts were published to ${AGENT_ARTIFACTS_BRANCH}; no open PR exists."
            fi
          fi

  verify-upload:
    name: Verify uploaded package
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: refresh
    steps:
      - name: Checkout workflow scripts
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_REF }}

      - name: Download packaged agent artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run download "${GITHUB_RUN_ID}" \
            --name "${{ needs.refresh.outputs.package_name }}" \
            --dir downloaded-agent-artifacts
          ls -lh downloaded-agent-artifacts

      - name: Verify downloaded package
        run: |
          set -euo pipefail
          python scripts/agents/agent_artifacts.py verify-package \
            --package downloaded-agent-artifacts/agent-artifacts.tar.gz \
            --manifest downloaded-agent-artifacts/agent-artifacts-manifest.json \
            --github-annotations
