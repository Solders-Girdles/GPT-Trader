name: Integration Tests (Manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: 'sandbox'
        type: choice
        options:
          - sandbox
          - production

jobs:
  integration:
    name: Coinbase Integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.event.inputs.environment }}
    env:
      GPT_TRADER_STRICT_CONTAINER: "1"
      PYTHONWARNINGS: default

    steps:
      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install uv
        # astral-sh/setup-uv@v7
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true

      - name: Set up Python
        # actions/setup-python@v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      # Only run if secrets are available
      - name: Run Integration Tests
        env:
          COINBASE_API_KEY: ${{ secrets.COINBASE_API_KEY }}
          COINBASE_API_SECRET: ${{ secrets.COINBASE_API_SECRET }}
          COINBASE_PASSPHRASE: ${{ secrets.COINBASE_PASSPHRASE }}
          COINBASE_ENV: ${{ github.event.inputs.environment }}
        run: |
          if [ -z "${COINBASE_API_KEY}" ] || [ -z "${COINBASE_API_SECRET}" ] || [ -z "${COINBASE_PASSPHRASE}" ]; then
            echo "Skipping integration tests: Coinbase secrets not set."
            exit 0
          fi
          echo "Running integration tests against ${{ github.event.inputs.environment }}..."
          # Running the integration tests that were previously in targeted-suites
          # assuming they are located in tests/integration or similar.
          # Based on targeted-suites.yml, it ran:
          # pytest tests/unit/gpt_trader/features/brokerages/coinbase -v (Coinbase API suite)
          # pytest tests/integration/test_paper_mode.py (Perps paper)

          # Override default marker filter in pytest.ini to run integration tests.
          uv run pytest tests/integration/ -v -m "integration and not real_api and not legacy_delete and not legacy_modernize"
